name: "AXIOM-RELEASE"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
          - platform: "macos-14" # Runners Apple Silicon para M1/M2/M3/M4
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Asegura que instalamos el target específico para el chip M4
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AXIOM VAULT ${{ github.ref_name }}"
          releaseBody: "Versión de Custodia PAU Estable. Soporte nativo Windows y Arquitectura nativa Apple M4."
          releaseDraft: true
          prerelease: false
          # IMPORTANTE: Aquí es donde pasamos los argumentos de la matriz (el target M4)
          args: ${{ matrix.args }} --verbose